# Trimmed fixture: a rendered (helm-template-style) manifest stream with
# two documents separated by `---`. NOT raw Helm templates — this is the
# valid YAML output a chart produces, exactly the input this adapter is
# built for. Enough surface to exercise multi-doc parsing, nested fields,
# list members, scalar typing, and file:line provenance.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
