# Trimmed fixture: a minimal cert-manager-style Certificate CRD.
# Not the full upstream bundle — only enough surface to exercise the
# adapter (group/kind/scope, nested object + array fields, a field with
# a description and a field with none).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io
spec:
  group: cert-manager.io
  scope: Namespaced
  names:
    kind: Certificate
    plural: certificates
    singular: certificate
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: A Certificate resource requests an X.509 certificate.
          type: object
          properties:
            spec:
              description: Desired state of the Certificate resource.
              type: object
              properties:
                renewBefore:
                  description: How long before expiry a certificate should be renewed.
                  type: string
                secretName:
                  description: Name of the Secret to store the certificate in.
                  type: string
                duration:
                  type: string
                dnsNames:
                  description: DNSNames is a list of DNS subjectAltNames.
                  type: array
                  items:
                    type: string
                subject:
                  description: Full X.509 name specification.
                  type: object
                  properties:
                    organizations:
                      description: Organizations to be used on the Certificate.
                      type: array
                      items:
                        type: string
