name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    # CodeQL uploads to GitHub code scanning, which needs Advanced Security on
    # private repos. Skip while private; this activates automatically when the
    # repo is made public at launch. (govulncheck in security.yml needs no
    # upload and runs regardless.)
    if: ${{ github.event.repository.visibility == 'public' }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
