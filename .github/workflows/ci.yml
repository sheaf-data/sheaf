name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      # The test suite is Unix-only (serve_e2e_test.go uses syscall.Setpgid/Kill;
      # some goldens assume Unix paths), so Windows isn't in the test matrix
      # below. Cross-compile here to still catch Windows build breaks in non-test
      # code — the release pipeline ships Windows binaries.
      - name: go build (windows cross-compile)
        run: GOOS=windows GOARCH=amd64 go build ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted; run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.8
          # Build golangci-lint from source with this job's Go toolchain.
          # The prebuilt v1.64.8 binary is built with Go 1.24, and
          # golangci-lint refuses to run when its build-Go is older than
          # the module's targeted Go (go.mod is go 1.26.2). goinstall
          # compiles it against go.mod's toolchain, so build-Go == target.
          install-mode: goinstall
          args: --timeout=5m

  # Stage 2 (sheaf-ci-requirements.md §4): the test gate, run with the race
  # detector on linux + macOS. `go test ./... -race -count=1` (including
  # utils/scanner/inprocess_test.go, which guards the sheaf-self.html golden)
  # is blocking from its first run.
  #
  # Go is pinned to go.mod (currently 1.26.4) rather than the 1.22/1.23 pair
  # from the original plan: the go.mod directive makes older toolchains refuse
  # to build, so the matrix varies OS only. Windows is intentionally absent —
  # the test suite is Unix-only (serve_e2e_test.go uses syscall.Setpgid/Kill;
  # some goldens assume Unix paths). Windows binaries are cross-compiled in the
  # checks job and shipped by the release pipeline; making the suite
  # Windows-clean is tracked separately. setup-go's cache is keyed per-OS.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test ./... -race -count=1
