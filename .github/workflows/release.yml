name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload artifacts
  id-token: write # OIDC token for cosign keyless signing (Fulcio/Rekor)

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for the changelog and version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # cosign signs the checksums + SBOMs; syft generates the SBOMs.
      # Both are invoked by goreleaser (see .goreleaser.yaml signs/sboms blocks).
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
