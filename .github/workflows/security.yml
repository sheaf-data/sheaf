name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC

permissions:
  contents: read

jobs:
  # govulncheck only reports vulnerabilities actually reachable from this
  # code, so false positives are rare — let it block.
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # gosec is noisier (heuristic SAST). Upload findings to the Security tab
  # for triage instead of red-walling CI before the first triage pass
  # (see 8box: "Review + suppress/fix initial findings").
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -no-fail -fmt sarif -out gosec.sarif ./...

      # Uploading to the Security tab needs code scanning (Advanced Security on
      # private repos). Skip while private; the gosec run above still executes
      # (-no-fail). Activates when the repo is public at launch.
      - name: Upload SARIF
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
