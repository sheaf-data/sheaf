# Dependabot — weekly dependency PRs for Go modules and Actions.
# Grouped so a week's bumps arrive as one PR per ecosystem, not a swarm.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    groups:
      go-modules:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
