# GoReleaser v2 — cross-platform binaries for the v0.1.0 release.
# CI runs `goreleaser release --clean` on tag push (.github/workflows/release.yml).
# Validate locally with:  goreleaser check  &&  goreleaser release --snapshot --clean
version: 2

project_name: sheaf

before:
  hooks:
    - go mod tidy

builds:
  - id: sheaf
    main: ./cmd/sheaf
    binary: sheaf
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/sheaf-data/sheaf/internal/cli.BuildVersion={{ .Version }}
      - -X github.com/sheaf-data/sheaf/internal/cli.BuildCommit={{ .Commit }}
      - -X github.com/sheaf-data/sheaf/internal/cli.BuildDate={{ .Date }}

archives:
  - id: sheaf
    formats: [tar.gz]
    # Windows users get a .zip instead of .tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

# Software bill of materials, one per archive, in both standard formats.
# Generated by syft (installed in the release workflow via anchore/sbom-action).
sboms:
  - id: spdx
    artifacts: archive
    documents: ["{{ .ArtifactName }}.spdx.sbom.json"]
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: cyclonedx
    artifacts: archive
    documents: ["{{ .ArtifactName }}.cdx.sbom.json"]
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# Keyless signing via cosign + the GitHub Actions OIDC token (Fulcio/Rekor).
# No long-lived keys: identity is the workflow's OIDC claim, logged in the
# public Sigstore transparency log. Requires `id-token: write` in the workflow
# (.github/workflows/release.yml) and cosign on PATH (sigstore/cosign-installer).
# We sign the checksums file (covers every archive transitively) and each SBOM.
signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    output: true
  - id: sboms
    cmd: cosign
    artifacts: sbom
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
